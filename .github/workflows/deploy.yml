# Deploy Website — GitHub Pages + Shared Hosting (SSH)

name: Deploy Website

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  # Deploy to GitHub Pages
  deploy-pages:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Refresh event calendar from sources
        # Safe: only ADDS new events as 'pending'. Exits silently if all scrapers fail.
        # Run with --no-fail-on-scraper-error so we never block a deploy on calendar data.
        run: |
          if ! node scripts/curate-events.js refresh 2>&1; then
            echo "::warning::curate-events refresh failed — continuing deploy with existing calendar"
          fi
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # Deploy to shared hosting via SSH/rsync
  deploy-server:
    name: Deploy to Shared Hosting
    runs-on: ubuntu-latest
    needs: deploy-pages
    if: vars.SSH_ENABLED == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Refresh event calendar from sources
        run: |
          if ! node scripts/curate-events.js refresh 2>&1; then
            echo "::warning::curate-events refresh failed — continuing deploy with existing calendar"
          fi

      - name: Install SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Transform paths for root domain
        run: |
          sed -i 's|/3tres6muntanerRecords/|/|g' $(find . -type f \( -name '*.html' -o -name '*.js' -o -name '*.json' \) | grep -v node_modules)

      - name: Deploy via rsync
        run: |
          rsync -avz --delete --exclude '.git' --exclude 'node_modules' --exclude 'backend/node_modules' \
            ./ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.SSH_PATH }}

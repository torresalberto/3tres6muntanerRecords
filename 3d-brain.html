<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
  <title>3TRES6 Neural — DJ Connection Map</title>
  <meta name="description" content="Interactive visualization of DJ connections via shared tracks. Explore which DJs play the same tracks." />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      font-family: 'Space Grotesk', sans-serif;
      color: #fff;
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* HEADER */
    .network-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 2rem;
      background: rgba(10,10,10,0.95);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      z-index: 10;
      gap: 1.5rem;
      flex-shrink: 0;
    }
    .network-logo span { display: block; }
    .network-logo .main { font-size: 1.3rem; font-weight: 700; letter-spacing: -0.02em; color: #fff; }
    .network-logo .main em { color: #ff4d00; font-style: normal; }
    .network-logo .sub { font-size: 0.65rem; color: rgba(255,255,255,0.25); letter-spacing: 0.12em; text-transform: uppercase; }

    .search-wrapper {
      position: relative;
      flex: 1;
      max-width: 400px;
    }
    .search-wrapper input {
      width: 100%;
      padding: 0.6rem 1rem 0.6rem 2.4rem;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 50px;
      color: #fff;
      font-size: 0.85rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.3s;
    }
    .search-wrapper input:focus { border-color: #ff4d00; }
    .search-icon {
      position: absolute;
      left: 0.9rem;
      top: 50%;
      transform: translateY(-50%);
      font-size: 0.8rem;
      opacity: 0.3;
    }

    .header-actions {
      display: flex;
      gap: 0.6rem;
    }
    .header-btn {
      padding: 0.5rem 1rem;
      border-radius: 50px;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      font-family: inherit;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.04);
      color: rgba(255,255,255,0.5);
      transition: all 0.2s;
    }
    .header-btn:hover { background: rgba(255,77,0,0.15); border-color: #ff4d00; color: #ff4d00; }

    /* SVG CONTAINER */
    #network-container {
      flex: 1;
      position: relative;
      overflow: hidden;
    }
    #network-container svg {
      width: 100%;
      height: 100%;
    }

    /* STATS BAR */
    .network-stats {
      display: flex;
      justify-content: center;
      gap: 2rem;
      padding: 0.6rem 2rem;
      background: rgba(10,10,10,0.95);
      border-top: 1px solid rgba(255,255,255,0.06);
      font-size: 0.72rem;
      color: rgba(255,255,255,0.3);
      z-index: 10;
      flex-shrink: 0;
    }
    .network-stats strong { color: rgba(255,255,255,0.6); }
    .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; }
    .dj-dot { background: #ff4d00; }
    .conn-dot { background: #00c864; }

    /* INFO PANEL */
    .network-info {
      position: fixed;
      bottom: 4rem;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      z-index: 20;
      background: rgba(20,20,20,0.95);
      border: 1px solid rgba(255,77,0,0.25);
      border-radius: 16px;
      padding: 1.5rem 2rem;
      min-width: 360px;
      max-width: 500px;
      backdrop-filter: blur(20px);
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.4s, transform 0.4s, visibility 0.4s;
    }
    .network-info.visible {
      opacity: 1;
      visibility: visible;
      transform: translateX(-50%) translateY(0);
    }
    .info-close {
      position: absolute;
      top: 0.7rem;
      right: 1rem;
      background: none;
      border: none;
      color: rgba(255,255,255,0.3);
      font-size: 1.4rem;
      cursor: pointer;
      font-family: inherit;
      transition: color 0.2s;
    }
    .info-close:hover { color: #ff4d00; }
    .info-name {
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      color: #ff4d00;
    }
    .info-summary {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.5);
      margin-bottom: 1rem;
    }
    .info-list {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }
    .info-item {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.5rem 0.7rem;
      background: rgba(255,255,255,0.03);
      border-radius: 8px;
      font-size: 0.82rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    .info-item:hover { background: rgba(255,77,0,0.1); }
    .info-track {
      color: #00c864;
      font-weight: 600;
      max-width: 220px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .info-arrow { color: rgba(255,255,255,0.2); }
    .info-other { color: #ff4d00; font-weight: 600; }

    /* TOOLTIP */
    .graph-tooltip {
      position: absolute;
      padding: 0.4rem 0.7rem;
      background: rgba(0,0,0,0.9);
      border: 1px solid rgba(0,200,100,0.4);
      border-radius: 6px;
      color: #00c864;
      font-size: 0.7rem;
      font-weight: 600;
      pointer-events: none;
      opacity: 0;
      z-index: 30;
      transition: opacity 0.15s;
      white-space: nowrap;
    }
    .graph-tooltip.visible { opacity: 1; }

    @media (max-width: 768px) {
      .network-header { padding: 0.8rem 1rem; gap: 0.8rem; flex-wrap: wrap; }
      .search-wrapper { max-width: 100%; }
      .network-stats { gap: 1rem; font-size: 0.65rem; }
      .network-info { min-width: auto; width: 90%; padding: 1rem 1.2rem; }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <div class="network-header">
    <div class="network-logo">
      <span class="main">3TRES6 <em>NEURAL</em></span>
      <span class="sub">DJ Connection Map</span>
    </div>
    <div class="search-wrapper">
      <span class="search-icon">🔍</span>
      <input type="text" id="networkSearch" placeholder="Search DJ or track name..." />
    </div>
    <div class="header-actions">
      <button class="header-btn" id="resetViewBtn">⟲ Reset</button>
      <a href="/" class="header-btn">← Home</a>
    </div>
  </div>

  <!-- CANVAS -->
  <div id="network-container"></div>

  <!-- TOOLTIP -->
  <div class="graph-tooltip" id="graphTooltip"></div>

  <!-- STATS -->
  <div class="network-stats" id="networkStats">
    <span><strong id="statDJs">0</strong> DJs</span>
    <span><strong id="statConns">0</strong> Connections</span>
    <span><strong id="statVis">0</strong> Visible</span>
    <span class="legend"><span class="dot dj-dot"></span>DJ<span class="dot conn-dot"></span>Track Match</span>
  </div>

  <!-- INFO PANEL -->
  <div class="network-info" id="networkInfo">
    <button class="info-close" id="infoClose">×</button>
    <div class="info-name" id="infoName"></div>
    <div class="info-summary" id="infoSummary"></div>
    <div class="info-list" id="infoList"></div>
  </div>

  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script>
    // DATA — DJs with color palette
    const DJ_DATA = [
      { id:'chaos-in-the-cbd', name:'Chaos In The CBD', color:'#ff4d00' },
      { id:'palms-trax', name:'Palms Trax', color:'#ff6a2a' },
      { id:'laurent-garnier', name:'Laurent Garnier', color:'#ff8c00' },
      { id:'frankie-knuckles', name:'Frankie Knuckles', color:'#ff4d00' },
      { id:'floating-points', name:'Floating Points', color:'#7c4dff' },
      { id:'richie-hawtin', name:'Richie Hawtin', color:'#00bcd4' },
      { id:'avalon-emerson', name:'Avalon Emerson', color:'#00e5ff' },
      { id:'dj-pierre', name:'DJ Pierre', color:'#ff4d00' },
      { id:'kettama', name:'KETTAMA', color:'#ff9100' },
      { id:'young-marco', name:'Young Marco', color:'#00c864' },
      { id:'masters-at-work', name:'Masters At Work', color:'#ff6f00' },
      { id:'honey-dijon', name:'Honey Dijon', color:'#e91e63' },
      { id:'seth-troxler', name:'Seth Troxler', color:'#9c27b0' },
      { id:'carl-cox', name:'Carl Cox', color:'#ff5722' },
      { id:'motor-city-drum', name:'MCDE', color:'#4caf50' },
      { id:'alex-do', name:'Alex.Do', color:'#607d8b' },
      { id:'etapp-kyle', name:'Etapp Kyle', color:'#03a9f4' },
      { id:'call-super', name:'Call Super', color:'#8bc34a' },
      { id:'kerri-chandler', name:'Kerri Chandler', color:'#ff5722' },
      { id:'ian-pooley', name:'Ian Pooley', color:'#009688' },
      { id:'apollonia', name:'Apollonia', color:'#e040fb' },
      { id:'dixon', name:'Dixon', color:'#ffab00' },
      { id:'ben-ufo', name:'Ben UFO', color:'#795548' },
      { id:'moodymann', name:'Moodymann', color:'#37474f' },
      { id:'carl-craig', name:'Carl Craig', color:'#607d8b' },
      { id:'pangaea', name:'Pangaea', color:'#3e2723' },
      { id:'kink', name:'KiNK', color:'#1b5e20' },
      { id:'dj-koze', name:'DJ Koze', color:'#e65100' },
      { id:'objekt', name:'Objekt', color:'#4a148c' },
      { id:'ame', name:'Âme', color:'#01579b' },
      { id:'four-tet', name:'Four Tet', color:'#33691e' },
      { id:'maceo-plex', name:'Maceo Plex', color:'#880e4f' },
      { id:'larry-heard', name:'Larry Heard', color:'#bf360c' },
      { id:'joe-claussell', name:'Joe Claussell', color:'#3e2723' },
      { id:'shonky', name:'Shonky', color:'#1a237e' },
      { id:'tiger-woods', name:'Tiger & Woods', color:'#ff6f00' },
      { id:'nicolas-jaar', name:'Nicolas Jaar', color:'#006064' },
      { id:'demi-riquismo', name:'Demi Riquisimo', color:'#827717' },
      { id:'job-jobse', name:'Job Jobse', color:'#4e342e' },
      { id:'rey-colino', name:'Rey Colino', color:'#37474f' },
      { id:'vtss', name:'VTSS', color:'#d50000' },
      { id:'mark-broom', name:'Mark Broom', color:'#263238' },
      { id:'joy-orbison', name:'Joy Orbison', color:'#ffab40' },
    ];

    // Track cross-references from database
    const TRACK_CONNECTIONS = [
      ['carl-cox','seth-troxler','Chez Damier — Can You Feel It'],
      ['carl-cox','four-tet','New Order — Blue Monday'],
      ['carl-cox','laurent-garnier','New Order — Blue Monday'],
      ['laurent-garnier','four-tet','New Order — Blue Monday'],
      ['masters-at-work','moodymann','Marshall Jefferson — Move Your Body'],
      ['seth-troxler','carl-craig','Octave One — Blackwater'],
      ['carl-cox','carl-craig','Octave One — Blackwater'],
      ['carl-cox','laurent-garnier','Octave One — Blackwater'],
      ['carl-cox','seth-troxler','Octave One — Blackwater'],
      ['honey-dijon','seth-troxler','The Bucketheads — The Bomb!'],
      ['seth-troxler','honey-dijon','Kings Of Tomorrow — Finally'],
      ['kerri-chandler','honey-dijon','Peven Everett — Special'],
      ['masters-at-work','joe-claussell','Earth People — Dance'],
      ['dixon','ame','Âme — Asa'],
      ['dixon','ame','Âme & Curses — Shadow Of Love'],
      ['ben-ufo','kink','KiNK — Kazan'],
      ['pangaea','ben-ufo','Pangaea — Router'],
      ['four-tet','dj-koze','DJ Koze — All The Time'],
    ];

    // Build graph structure
    const djMap = {};
    DJ_DATA.forEach(d => { djMap[d.id] = d; });

    const nodes = DJ_DATA.map(d => ({ id: d.id, name: d.name, color: d.color, connections: 0 }));
    const links = [];
    const linkSet = new Set();

    TRACK_CONNECTIONS.forEach(([a, b, track]) => {
      const key = [a, b].sort().join('|') + '|' + track;
      if (!linkSet.has(key)) {
        linkSet.add(key);
        links.push({ source: djMap[a] ? DJ_DATA.findIndex(d => d.id === a) : -1, target: DJ_DATA.findIndex(d => d.id === b), track: track });
      }
    });

    // Count connections per node
    links.forEach(l => {
      nodes[l.source].connections++;
      nodes[l.target].connections++;
    });

    // ========== D3.js RENDER ==========
    const container = document.getElementById('network-container');
    const width = Math.max(container.clientWidth, window.innerWidth - 40, 800);
    const height = Math.max(container.clientHeight, window.innerHeight - 100, 500);

    const svg = d3.select('#network-container')
      .append('svg')
      .attr('width', width)
      .attr('height', height)
      .attr('viewBox', [0, 0, width, height]);

    const g = svg.append('g');

    // Zoom
    const zoom = d3.zoom()
      .scaleExtent([0.2, 4])
      .on('zoom', (event) => { g.attr('transform', event.transform); });
    svg.call(zoom);
    // Disable double-click zoom (annoying on mobile)
    svg.on('dblclick.zoom', null);

    // Tooltip
    const tooltip = document.getElementById('graphTooltip');
    const infoPanel = document.getElementById('networkInfo');

    // Force simulation
    const simulation = d3.forceSimulation(nodes)
      .force('link', d3.forceLink(links).id(d => d.id).distance(180))
      .force('charge', d3.forceManyBody().strength(-400))
      .force('center', d3.forceCenter(width / 2, height / 2))
      .force('collision', d3.forceCollide(d => Math.max(30, d.connections * 4 + 25)));

    // Connection lines
    const link = g.append('g')
      .selectAll('line')
      .data(links)
      .enter().append('line')
      .attr('stroke', 'rgba(0,200,100,0.25)')
      .attr('stroke-width', 1.5)
      .attr('stroke-dasharray', '3,2')
      .style('cursor', 'default');

    // DJ nodes
    const node = g.append('g')
      .selectAll('g')
      .data(nodes)
      .enter().append('g')
      .call(d3.drag()
        .on('start', (event, d) => { if (!event.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
        .on('drag', (event, d) => { d.fx = event.x; d.fy = event.y; })
        .on('end', (event, d) => { if (!event.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; })
      )
      .style('cursor', 'grab');

    // Node circles
    node.append('circle')
      .attr('r', d => Math.max(10, d.connections * 2 + 10))
      .attr('fill', d => d.color)
      .attr('stroke', d => d.connections > 0 ? '#fff' : 'rgba(255,255,255,0.3)')
      .attr('stroke-width', d => d.connections > 0 ? 2 : 1)
      .attr('opacity', 0.85);

    // Node labels
    node.append('text')
      .text(d => d.name)
      .attr('x', d => Math.max(14, d.connections * 2 + 14))
      .attr('y', 4)
      .attr('fill', '#fff')
      .attr('font-size', d => d.connections > 0 ? '11px' : '9px')
      .attr('font-weight', d => d.connections > 0 ? 600 : 400)
      .attr('font-family', 'Space Grotesk, sans-serif')
      .style('pointer-events', 'none');

    // HOVER — highlight connected, dim others
    node.on('mouseenter', function(event, d) {
      const connectedIds = new Set();
      links.forEach(l => {
        if (l.source.id === d.id) connectedIds.add(l.target.id);
        if (l.target.id === d.id) connectedIds.add(l.source.id);
      });
      connectedIds.add(d.id);

      node.selectAll('circle').attr('opacity', n => connectedIds.has(n.id) ? 1 : 0.12);
      node.selectAll('text').attr('opacity', n => connectedIds.has(n.id) ? 1 : 0);
      link.attr('stroke', l => {
        if ((l.source.id === d.id && connectedIds.has(l.target.id)) || (l.target.id === d.id && connectedIds.has(l.source.id))) {
          return 'rgba(0,200,100,0.9)';
        }
        return 'rgba(255,255,255,0.02)';
      }).attr('stroke-width', l => {
        if ((l.source.id === d.id && connectedIds.has(l.target.id)) || (l.target.id === d.id && connectedIds.has(l.source.id))) {
          return 3;
        }
        return 1;
      }).attr('stroke-dasharray', l => {
        if ((l.source.id === d.id && connectedIds.has(l.target.id)) || (l.target.id === d.id && connectedIds.has(l.source.id))) {
          return null;
        }
        return '3,2';
      });

      document.getElementById('network-container').style.cursor = 'pointer';
    });

    node.on('mouseleave', function() {
      node.selectAll('circle').attr('opacity', 0.85);
      node.selectAll('text').attr('opacity', 1);
      link.attr('stroke', 'rgba(0,200,100,0.25)').attr('stroke-width', 1.5).attr('stroke-dasharray', '3,2');
      document.getElementById('network-container').style.cursor = 'default';
    });

    // CLICK — show info panel
    node.on('click', function(event, d) {
      const conns = [];
      links.forEach(l => {
        if (l.source.id === d.id) conns.push({ other: l.target, track: l.track });
        if (l.target.id === d.id) conns.push({ other: l.source, track: l.track });
      });

      document.getElementById('infoName').textContent = d.name;
      document.getElementById('infoSummary').textContent = conns.length + ' track connection' + (conns.length !== 1 ? 's' : '');

      const list = document.getElementById('infoList');
      if (conns.length === 0) {
        list.innerHTML = '<div class="info-item" style="color:rgba(255,255,255,0.3)">No track connections yet. Keep feeding the library!</div>';
      } else {
        list.innerHTML = conns.map(c => `
          <div class="info-item">
            <span class="info-track" title="${c.track}">${c.track}</span>
            <span class="info-arrow">→</span>
            <span class="info-other">${c.other.name}</span>
          </div>
        `).join('');
      }

      infoPanel.classList.add('visible');
    });

    // CLOSE info panel
    document.getElementById('infoClose').addEventListener('click', () => {
      infoPanel.classList.remove('visible');
    });

    // SEARCH
    document.getElementById('networkSearch').addEventListener('input', function() {
      const q = this.value.toLowerCase().trim();
      if (!q) {
        node.selectAll('circle').attr('opacity', 0.85);
        node.selectAll('text').attr('opacity', 1);
        link.attr('stroke', 'rgba(0,200,100,0.25)');
        document.getElementById('statVis').textContent = nodes.length;
        return;
      }

      const matchingIds = new Set();
      nodes.forEach(n => {
        if (n.name.toLowerCase().includes(q)) matchingIds.add(n.id);
      });
      links.forEach(l => {
        if (l.track && l.track.toLowerCase().includes(q)) {
          matchingIds.add(l.source.id);
          matchingIds.add(l.target.id);
        }
      });

      node.selectAll('circle').attr('opacity', n => matchingIds.has(n.id) ? 1 : 0.08);
      node.selectAll('text').attr('opacity', n => matchingIds.has(n.id) ? 1 : 0);
      link.attr('stroke', l => {
        if (matchingIds.has(l.source.id) && matchingIds.has(l.target.id)) return 'rgba(0,200,100,0.6)';
        return 'rgba(255,255,255,0.02)';
      });
      document.getElementById('statVis').textContent = matchingIds.size;
    });

    // RESET
    document.getElementById('resetViewBtn').addEventListener('click', () => {
      svg.transition().duration(500).call(zoom.transform, d3.zoomIdentity);
      node.selectAll('circle').attr('opacity', 0.85);
      node.selectAll('text').attr('opacity', 1);
      link.attr('stroke', 'rgba(0,200,100,0.25)');
      document.getElementById('networkSearch').value = '';
      document.getElementById('statVis').textContent = nodes.length;
      infoPanel.classList.remove('visible');
    });

    // Tick
    simulation.on('tick', () => {
      link.attr('x1', d => d.source.x).attr('y1', d => d.source.y)
          .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
      node.attr('transform', d => `translate(${d.x},${d.y})`);
    });

    // Resize
    window.addEventListener('resize', () => {
      const w = container.clientWidth;
      const h = container.clientHeight;
      svg.attr('width', w).attr('height', h);
      simulation.force('center', d3.forceCenter(w / 2, h / 2));
      simulation.alpha(0.3).restart();
    });

    // Stats
    document.getElementById('statDJs').textContent = nodes.length;
    document.getElementById('statConns').textContent = links.length;
    document.getElementById('statVis').textContent = nodes.length;
  </script>
</body>
</html>

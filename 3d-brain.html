    .header.scrolled {
      background: rgba(5,5,5,0.82);
      border-bottom-color: rgba(255,255,255,0.04);
      backdrop-filter: blur(20px) saturate(1.2);

    .header-container {

      padding: 0 48px;
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: space-between;

    .logo { display: flex; flex-direction: column; gap: 1px; text-decoration: none; }
    .logo-text { font-size: 20px; font-weight: 700; letter-spacing: 3px; color: #fff; line-height: 1; }
    .logo-subtitle { font-size: 9px; font-weight: 400; color: rgba(255,255,255,0.35); letter-spacing: 4px; line-height: 1; }
    .main-nav { display: flex; gap: 20px; align-items: center; }

    .nav-separator { width: 1px; height: 14px; background: rgba(255,255,255,0.1); flex-shrink: 0; margin: 0 4px; }
    .nav-item {

      font-size: 11px;
      font-weight: 300;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
      transition: color 0.3s ease;
      padding: 8px 0;
      text-decoration: none;
      background: none;
      border: none;
      cursor: pointer;
      font-family: inherit;
    }
    .nav-item::before {
      content: ''; position: absolute; top: -2px; left: 50%;
      transform: translateX(-50%) scale(0);
      width: 3px; height: 3px; border-radius: 50%;
      background: #ff4d00;
      transition: transform 0.3s ease;
    }
    .nav-item:hover { color: rgba(255,255,255,0.9); }
    .nav-item:hover::before { transform: translateX(-50%) scale(1); }
    .nav-item.active { color: rgba(255,255,255,0.9); }
    .nav-item.active::before { transform: translateX(-50%) scale(1); }

    .nav-item.affiliate:hover { color: rgba(255,200,100,0.8); }
    .header-actions { display: flex; align-items: center; gap: 24px; }
    .discogs-link {
      font-size: 10px; font-weight: 400; letter-spacing: 2px;
      text-transform: uppercase; color: rgba(255,255,255,0.35);

    .mobile-menu-btn {

      width: 22px; height: 16px; background: none; border: none;

    .mobile-menu-btn.active span:nth-child(1) { transform: rotate(45deg) translate(5px,5px); }
    .mobile-menu-btn.active span:nth-child(2) { opacity: 0; }
    .mobile-menu-btn.active span:nth-child(3) { transform: rotate(-45deg) translate(5px,-5px); }

      opacity: 0; visibility: hidden;
      transition: opacity 0.4s ease, visibility 0.4s ease;
      backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
    }
    .mobile-nav.active { opacity: 1; visibility: visible; }
    .mobile-nav a {
      font-size: 20px; font-weight: 300; letter-spacing: 4px;
      text-transform: uppercase; color: rgba(255,255,255,0.5);
      transition: color 0.3s ease; text-decoration: none;

    .mobile-nav a:hover { color: #ff4d00; }

    .viz-search {

      top: 6rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 15;
      width: 320px;
      max-width: 90vw;
    }
    .viz-search input {
      width: 100%;
      padding: 0.55rem 1rem 0.55rem 2.4rem;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 50px;
      color: #fff;
      font-size: 0.8rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.3s, background 0.3s;
      backdrop-filter: blur(8px);
    }

    .viz-search .search-icon { position: absolute; left: 0.9rem; top: 50%; transform: translateY(-50%); font-size: 0.75rem; opacity: 0.3; pointer-events: none; }
    .viz-reset {
      position: absolute;
      top: 6rem;
      right: 1.5rem;
      z-index: 15;

      font-size: 0.75rem;
      font-weight: 600;

      overflow: hidden;
      cursor: grab;

    #network-container:active { cursor: grabbing; }
    #network-container svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* BACKGROUND GRID */
    .bg-grid {
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0.15;
      background-image:

      padding: 0.6rem 2rem;

    }
    .info-group {
      margin-bottom: 1.2rem;
    }
    .info-group-title {
      font-size: 0.7rem;
      color: rgba(255,255,255,0.35);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 0.5rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;

    .info-item {

    .info-set {
      font-size: 0.7rem;
      color: rgba(255,255,255,0.3);
      margin-top: 0.15rem;

      bottom: 3.5rem;
      left: 2rem;
      z-index: 20;
      background: rgba(12,12,12,0.9);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px;
      padding: 0.8rem 1rem;
      backdrop-filter: blur(12px);

    .genre-legend-title {

      color: rgba(255,255,255,0.35);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 0.5rem;

    .genre-item {

      align-items: center;
      gap: 0.4rem;
      font-size: 0.72rem;
      color: rgba(255,255,255,0.5);
      margin-bottom: 0.25rem;

      height: 8px;
      border-radius: 50%;

];

// ======== MULTI-DJ TRACKS ========
const MULTI_DJ_TRACKS = [
  { track: "Ame - Asa", djs: ["ame", "dixon"], sets: ["ame-br-innervisions-ade-2012", "dixon-cercle-2024"] },
  { track: "Ame & Curses - Shadow Of Love", djs: ["ame", "dixon"], sets: ["ame-br-innervisions-ade-2012", "dixon-cercle-2024"] },
  { track: "KiNK - Kazan", djs: ["ben-ufo", "kink"], sets: ["ben-ufo-br-sugar-mountain-2025", "kink-br-moscow-2014"] },
  { track: "Pangaea - Router", djs: ["ben-ufo", "pangaea"], sets: ["ben-ufo-br-sugar-mountain-2025", "pangaea-br-dekmantel-2015"] },
  { track: "Chez Damier - Can You Feel It (Steve Bug Re-Dub)", djs: ["carl-cox", "seth-troxler"], sets: ["carl-cox-ibiza-villa", "seth-troxler-via-cross-ref"] },
  { track: "New Order - Blue Monday (Original 12 Mix)", djs: ["carl-cox", "four-tet", "laurent-garnier"], sets: ["carl-cox-ibiza-villa", "four-tet-via-cross-ref", "laurent-garnier-via-cross-ref"] },
  { track: "Octave One - Blackwater", djs: ["carl-craig", "seth-troxler", "carl-cox", "laurent-garnier"], sets: ["carl-craig-br-rbma-2013", "seth-troxler-br-mexico-2014", "carl-cox-via-cross-ref", "laurent-garnier-via-cross-ref"] },
  { track: "DJ Koze - All The Time", djs: ["dj-koze", "four-tet"], sets: ["dj-koze-various", "four-tet-br-london-2015"] },
  { track: "The Bucketheads - The Bomb! (Armand Van Helden Re-Edit)", djs: ["honey-dijon", "seth-troxler"], sets: ["honey-dijon-dekmantel-2025", "seth-troxler-via-cross-ref"] },
  { track: "Earth People - Dance", djs: ["joe-claussell", "masters-at-work"], sets: ["joe-claussell-br-paris-2014", "maw-br-london-2014", "masters-at-work-via-cross-ref"] },
  { track: "Peven Everett - Special (Timmy Regisford Remix)", djs: ["kerri-chandler", "honey-dijon"], sets: ["kerri-chandler-br-nyc-2022", "honey-dijon-via-cross-ref"] },
  { track: "Marshall Jefferson - Move Your Body", djs: ["masters-at-work", "moodymann"], sets: ["maw-br-london-2014", "masters-at-work-via-cross-ref", "moodymann-via-cross-ref"] },
  { track: "Kings Of Tomorrow - Finally", djs: ["seth-troxler", "honey-dijon"], sets: ["seth-troxler-br-mexico-2014", "honey-dijon-via-cross-ref"] }
];

    // ======== BUILD GRAPH ========
    const djMap = {};
    DJ_DATA.forEach(d => { djMap[d.id] = d; });

    const nodes = DJ_DATA.map(d => ({
      id: d.id,
      name: d.name,
      genre: d.genre,
      color: getGenreColor(d.genre),
      connections: 0,
      x3: 0, y3: 0, z3: 0,
      x2: 0, y2: 0, z2: 0, scale: 1
    }));

    const links = [];
    const linkSet = new Set();

    MULTI_DJ_TRACKS.forEach(t => {
      const djs = t.djs;
      for (let i = 0; i < djs.length; i++) {
        for (let j = i + 1; j < djs.length; j++) {
          const a = djs[i], b = djs[j];
          const key = [a, b].sort().join('|');
          if (!linkSet.has(key)) {
            linkSet.add(key);
            const na = nodes.find(n => n.id === a);
            const nb = nodes.find(n => n.id === b);
            if (na && nb) {
              links.push({ source: na, target: nb, track: t.track, sets: t.sets });
              na.connections++;
              nb.connections++;
            }
          }
        }
      }
    });

    // ======== SPHERICAL LAYOUT ========
    function fibonacciSphere(n, radius) {
      const pts = [];
      const phi = Math.PI * (3 - Math.sqrt(5));
      for (let i = 0; i < n; i++) {
        const y = 1 - (i / (n - 1)) * 2;
        const r = Math.sqrt(1 - y * y);
        const theta = phi * i;
        const x = Math.cos(theta) * r;
        const z = Math.sin(theta) * r;
        pts.push({ x: x * radius, y: y * radius, z: z * radius });
      }
      return pts;
    }

    // Place connected DJs closer together using force relaxation
    const radius = 280;
    const positions = fibonacciSphere(nodes.length, radius);

    // Seed initial positions
    nodes.forEach((n, i) => {
      n.x3 = positions[i].x;
      n.y3 = positions[i].y;
      n.z3 = positions[i].z;
    });

    // Relax: connected nodes attract, all nodes repel
    for (let iter = 0; iter < 200; iter++) {
      // Attraction
      links.forEach(l => {
        const dx = l.target.x3 - l.source.x3;
        const dy = l.target.y3 - l.source.y3;
        const dz = l.target.z3 - l.source.z3;
        const dist = Math.sqrt(dx*dx + dy*dy + dz*dz) || 1;
        const force = 0.3 * (dist - radius * 0.4) / dist;
        const fx = dx * force;
        const fy = dy * force;
        const fz = dz * force;
        l.source.x3 += fx; l.source.y3 += fy; l.source.z3 += fz;
        l.target.x3 -= fx; l.target.y3 -= fy; l.target.z3 -= fz;
      });
      // Repulsion
      for (let i = 0; i < nodes.length; i++) {
        for (let j = i + 1; j < nodes.length; j++) {
          const a = nodes[i], b = nodes[j];
          const dx = b.x3 - a.x3;
          const dy = b.y3 - a.y3;
          const dz = b.z3 - a.z3;
          const dist = Math.sqrt(dx*dx + dy*dy + dz*dz) || 1;
          const force = -80 / (dist * dist);
          const fx = dx * force;
          const fy = dy * force;
          const fz = dz * force;
          a.x3 += fx; a.y3 += fy; a.z3 += fz;
          b.x3 -= fx; b.y3 -= fy; b.z3 -= fz;
        }
      }
      // Re-project to sphere surface
      nodes.forEach(n => {
        const dist = Math.sqrt(n.x3*n.x3 + n.y3*n.y3 + n.z3*n.z3) || 1;
        n.x3 = (n.x3 / dist) * radius;
        n.y3 = (n.y3 / dist) * radius;
        n.z3 = (n.z3 / dist) * radius;
      });
    }

    // ======== 3D PROJECTION ========
    let rotX = 0.4, rotY = 0.6;
    let targetRotX = 0.4, targetRotY = 0.6;
    let autoRotate = true;
    let dragStart = null;
    let dragStartRot = null;

    function project(x, y, z, w, h) {
      // Rotate around Y
      let x1 = x * Math.cos(rotY) - z * Math.sin(rotY);
      let z1 = x * Math.sin(rotY) + z * Math.cos(rotY);
      // Rotate around X
      let y1 = y * Math.cos(rotX) - z1 * Math.sin(rotX);
      let z2 = y * Math.sin(rotX) + z1 * Math.cos(rotX);
      // Perspective
      const camDist = 900;
      const scale = camDist / (camDist - z2);
      return {
        x: w / 2 + x1 * scale,
        y: h / 2 + y1 * scale,
        z: z2,
        scale: scale
      };
    }

    // ======== RENDER ========
    const svg = document.getElementById('sphere-svg');
    const tooltip = document.getElementById('graphTooltip');
    const container = document.getElementById('network-container');
    let w = container.clientWidth;
    let h = container.clientHeight;

    // Create SVG definitions (filters, gradients)
    const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
    defs.innerHTML = `
      <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="4" result="blur" />
        <feMerge>
          <feMergeNode in="blur" />
          <feMergeNode in="SourceGraphic" />
        </feMerge>
      </filter>
      <filter id="glow-strong" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="8" result="blur" />
        <feMerge>
          <feMergeNode in="blur" />
          <feMergeNode in="blur" />
          <feMergeNode in="SourceGraphic" />
        </feMerge>
      </filter>
      <radialGradient id="sphere-bg" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="rgba(255,77,0,0.03)" />
        <stop offset="100%" stop-color="transparent" />
      </radialGradient>
    `;
    svg.appendChild(defs);

    // Groups for z-sorting
    const linkGroup = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    const nodeGroup = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    const labelGroup = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    svg.appendChild(linkGroup);
    svg.appendChild(nodeGroup);
    svg.appendChild(labelGroup);

    // Create link elements
    const linkEls = links.map(l => {
      const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.setAttribute('stroke', 'rgba(0,200,100,0.35)');
      line.setAttribute('stroke-width', '1.5');
      line.setAttribute('stroke-dasharray', '4,3');
      line.style.transition = 'stroke 0.3s, stroke-width 0.3s, opacity 0.3s';
      line.dataset.track = l.track;
      linkGroup.appendChild(line);
      return { el: line, data: l };
    });

    // Create node elements
    const nodeEls = nodes.map(n => {
      const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
      g.style.cursor = 'pointer';
      g.style.transition = 'opacity 0.3s';

      const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      const r = Math.max(5, n.connections * 2.5 + 5);
      circle.setAttribute('r', r);
      circle.setAttribute('fill', n.color);
      circle.setAttribute('stroke', n.connections > 0 ? '#fff' : 'rgba(255,255,255,0.2)');
      circle.setAttribute('stroke-width', n.connections > 0 ? 2 : 1);
      circle.setAttribute('filter', n.connections > 0 ? 'url(#glow)' : '');
      circle.style.transition = 'r 0.3s, stroke-width 0.3s, opacity 0.3s';

      const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      label.textContent = n.name;
      label.setAttribute('fill', '#fff');
      label.setAttribute('font-size', n.connections > 0 ? '10px' : '9px');
      label.setAttribute('font-weight', n.connections > 0 ? '600' : '400');
      label.setAttribute('font-family', 'Space Grotesk, sans-serif');
      label.setAttribute('dy', r + 12);
      label.setAttribute('text-anchor', 'middle');
      label.style.pointerEvents = 'none';
      label.style.transition = 'opacity 0.3s';
      label.style.opacity = '0.7';

      g.appendChild(circle);
      nodeGroup.appendChild(g);
      labelGroup.appendChild(label);

      return { g, circle, label, data: n };
    });

    // ======== INTERACTION STATE ========
    let hoveredId = null;
    let selectedId = null;
    let filteredIds = null;

    function getConnectedIds(id) {
      const set = new Set([id]);
      links.forEach(l => {
        if (l.source.id === id) set.add(l.target.id);
        if (l.target.id === id) set.add(l.source.id);
      });
      return set;
    }

    // ======== HOVER ========
    nodeEls.forEach(ne => {
      ne.g.addEventListener('mouseenter', e => {
        hoveredId = ne.data.id;
        autoRotate = false;
        tooltip.textContent = ne.data.name;
        tooltip.classList.add('visible');

      });
      ne.g.addEventListener('mousemove', e => {
        tooltip.style.left = (e.clientX + 15) + 'px';
        tooltip.style.top = (e.clientY + 15) + 'px';
      });
      ne.g.addEventListener('mouseleave', () => {
        hoveredId = null;
        autoRotate = true;
        tooltip.classList.remove('visible');

      });
    });

    // ======== CLICK / POPUP ========
    const infoPanel = document.getElementById('networkInfo');

    nodeEls.forEach(ne => {
      ne.g.addEventListener('click', e => {
        e.stopPropagation();
        selectedId = ne.data.id;
        autoRotate = false;
        showInfo(ne.data);

      });
    });

    container.addEventListener('click', () => {
      selectedId = null;
      autoRotate = true;
      infoPanel.classList.remove('visible');

    });

    document.getElementById('infoClose').addEventListener('click', () => {
      selectedId = null;
      autoRotate = true;
      infoPanel.classList.remove('visible');

    });

    function showInfo(d) {
      document.getElementById('infoName').textContent = d.name;
      document.getElementById('infoGenre').textContent = d.genre;
      const conns = [];
      links.forEach(l => {
        if (l.source.id === d.id) conns.push({ other: l.target, track: l.track, sets: l.sets });
        if (l.target.id === d.id) conns.push({ other: l.source, track: l.track, sets: l.sets });
      });
      document.getElementById('infoSummary').textContent = conns.length + ' shared track' + (conns.length !== 1 ? 's' : '') + ' across the library';

      const list = document.getElementById('infoList');
      if (conns.length === 0) {
        list.innerHTML = '<div style="color:rgba(255,255,255,0.2);font-size:0.8rem;padding:1rem 0;">No shared tracks yet.</div>';
      } else {
        // Group by other DJ
        const byDJ = {};
        conns.forEach(c => {
          if (!byDJ[c.other.id]) byDJ[c.other.id] = { other: c.other, tracks: [] };
          byDJ[c.other.id].tracks.push(c);
        });
        list.innerHTML = Object.values(byDJ).map(g => `
          <div class="info-group">
            <div class="info-group-title">${g.other.name}</div>
            ${g.tracks.map(t => `
              <div class="info-item">
                <div>
                  <div class="info-track">${t.track}</div>
                  <div class="info-set">${t.sets.map(s => s.replace(/-/g, ' ')).join(' • ')}</div>
                </div>
              </div>
            `).join('')}
          </div>
        `).join('');
      }
      infoPanel.classList.add('visible');
    }

    // ======== SEARCH ========
    document.getElementById('networkSearch').addEventListener('input', function() {
      const q = this.value.toLowerCase().trim();
      if (!q) {
        filteredIds = null;

        document.getElementById('statVis').textContent = nodes.length;
        return;
      }
      filteredIds = new Set();
      nodes.forEach(n => {
        if (n.name.toLowerCase().includes(q) || n.genre.toLowerCase().includes(q)) filteredIds.add(n.id);
      });
      links.forEach(l => {
        if (l.track.toLowerCase().includes(q)) {
          filteredIds.add(l.source.id);
          filteredIds.add(l.target.id);
        }
      });

      document.getElementById('statVis').textContent = filteredIds.size;
    });

    // ======== RESET ========
    document.getElementById('resetViewBtn').addEventListener('click', () => {
      rotX = 0.4;
      rotY = 0.6;
      targetRotX = 0.4;
      targetRotY = 0.6;
      hoveredId = null;
      selectedId = null;
      filteredIds = null;
      autoRotate = true;
      document.getElementById('networkSearch').value = '';
      infoPanel.classList.remove('visible');

      document.getElementById('statVis').textContent = nodes.length;
    });

    // ======== DRAG TO ROTATE ========
    container.addEventListener('mousedown', e => {
      dragStart = { x: e.clientX, y: e.clientY };
      dragStartRot = { x: rotX, y: rotY };
      autoRotate = false;
      container.style.cursor = 'grabbing';
    });
    window.addEventListener('mousemove', e => {
      if (!dragStart) return;
      const dx = e.clientX - dragStart.x;
      const dy = e.clientY - dragStart.y;
      targetRotY = dragStartRot.y + dx * 0.005;
      targetRotX = dragStartRot.x - dy * 0.005;
    });
    window.addEventListener('mouseup', () => {
      if (dragStart) {
        dragStart = null;
        container.style.cursor = 'grab';
        if (!selectedId) autoRotate = true;
      }
    });

    // ======== ANIMATION LOOP ========
    function animate() {
      // Smooth rotation
      if (autoRotate) {
        targetRotY += 0.0015;
      }
      rotX += (targetRotX - rotX) * 0.08;
      rotY += (targetRotY - rotY) * 0.08;

      // Project all nodes
      nodeEls.forEach(ne => {
        const n = ne.data;
        const p = project(n.x3, n.y3, n.z3, w, h);
        n.x2 = p.x;
        n.y2 = p.y;
        n.z2 = p.z;
        n.scale = p.scale;
      });

      // Sort nodes by Z for proper overlap
      const sorted = nodeEls.slice().sort((a, b) => a.data.z2 - b.data.z2);

      // Determine active IDs for this frame
      const activeIds = filteredIds || (hoveredId ? getConnectedIds(hoveredId) : null);

      // Update node positions
      sorted.forEach(ne => {
        const n = ne.data;
        const s = n.scale;
        const r = Math.max(5, n.connections * 2.5 + 5) * s;
        const isActive = !activeIds || activeIds.has(n.id);
        const isHovered = n.id === hoveredId;
        const isSelected = n.id === selectedId;

        ne.g.setAttribute('transform', `translate(${n.x2}, ${n.y2}) scale(${s})`);
        ne.circle.setAttribute('r', r / s);
        ne.label.setAttribute('x', n.x2);
        ne.label.setAttribute('y', n.y2);
        ne.label.setAttribute('dy', r + 12 * s);
        ne.label.setAttribute('font-size', (n.connections > 0 ? 10 : 9) * s + 'px');

        // Z-occlusion combined with interaction state
        const zOpacity = n.z2 < -50 ? 0.3 : 1;
        const stateOpacity = isActive ? 1 : 0.1;
        ne.g.style.opacity = zOpacity * stateOpacity;
        ne.label.style.opacity = zOpacity * (isActive ? (isHovered || isSelected ? 1 : 0.7) : 0);

        if (isHovered || isSelected) {
          ne.circle.setAttribute('r', Math.max(8, n.connections * 3 + 8));
          ne.circle.setAttribute('filter', 'url(#glow-strong)');
          ne.circle.setAttribute('stroke-width', 3);
        } else {
          ne.circle.setAttribute('r', Math.max(5, n.connections * 2.5 + 5));
          ne.circle.setAttribute('filter', n.connections > 0 ? 'url(#glow)' : '');
          ne.circle.setAttribute('stroke-width', n.connections > 0 ? 2 : 1);
        }
      });

      // Update links
      linkEls.forEach(le => {
        const l = le.data;
        const s = l.source;
        const t = l.target;

        // Always set coordinates
        le.el.setAttribute('x1', s.x2);
        le.el.setAttribute('y1', s.y2);
        le.el.setAttribute('x2', t.x2);
        le.el.setAttribute('y2', t.y2);

        // Midpoint Z determines if line is "inside" the sphere
        const midZ = (s.z2 + t.z2) / 2;
        const isBehind = midZ < -30;

        if (isBehind) {
          le.el.style.opacity = 0.05;
        } else {
          const isActive = !filteredIds || (filteredIds.has(s.id) && filteredIds.has(t.id));
          const isHovered = hoveredId && (s.id === hoveredId || t.id === hoveredId);
          le.el.style.opacity = isActive || isHovered ? 1 : 0.1;
          if (isActive || isHovered) {
            const phase = (Date.now() / 20) % 20;
            le.el.setAttribute('stroke-dashoffset', -phase);
          }
        }
      });

      requestAnimationFrame(animate);
    }

    // ======== RESIZE ========
    window.addEventListener('resize', () => {
      w = container.clientWidth;
      h = container.clientHeight;
      svg.setAttribute('width', w);
      svg.setAttribute('height', h);
      svg.setAttribute('viewBox', `0 0 ${w} ${h}`);
    });
    svg.setAttribute('width', w);
    svg.setAttribute('height', h);
    svg.setAttribute('viewBox', `0 0 ${w} ${h}`);

    // ======== GENRE LEGEND ========
    const usedGenres = [...new Set(nodes.map(n => n.genre))].sort();
    document.getElementById('legendItems').innerHTML = usedGenres.map(g => `
      <div class="genre-item">
        <span class="genre-color" style="background:${getGenreColor(g)}"></span>
        ${g}
      </div>
    `).join('');

    // ======== STATS ========
    document.getElementById('statDJs').textContent = nodes.length;
    document.getElementById('statConns').textContent = links.length;
    document.getElementById('statVis').textContent = nodes.length;

    // Start
    animate();
  </script>
</body>
</html>

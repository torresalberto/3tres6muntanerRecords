<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
  <title>3TRES6 Records — 3D Neural Network</title>
  <meta name="description" content="Interactive 3D visualization of DJ connections, track relationships and the Muntaner336 musical universe." />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      overflow: hidden;
      font-family: 'Space Grotesk', sans-serif;
      color: #fff;
      cursor: default;
    }

    #canvas-container {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
    }

    /* HUD Overlay */
    .hud {
      position: fixed;
      z-index: 10;
      pointer-events: none;
    }

    .hud-top-left {
      top: 2rem;
      left: 2.5rem;
    }

    .hud-bottom {
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
    }

    .hud-title {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #fff;
      text-shadow: 0 0 40px rgba(255,77,0,0.3);
    }

    .hud-title span {
      color: #ff4d00;
    }

    .hud-subtitle {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.3);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-top: 0.3rem;
    }

    .hud-hint {
      font-size: 0.7rem;
      color: rgba(255,255,255,0.15);
      letter-spacing: 0.1em;
    }

    .hud-stats {
      position: fixed;
      bottom: 2.5rem;
      right: 2.5rem;
      z-index: 10;
      text-align: right;
      pointer-events: none;
    }

    .hud-stat {
      font-size: 0.65rem;
      color: rgba(255,255,255,0.2);
      letter-spacing: 0.05em;
      line-height: 1.8;
    }

    .hud-stat strong {
      color: rgba(255,77,0,0.5);
      font-weight: 600;
    }

    .back-link {
      position: fixed;
      top: 2rem;
      right: 2.5rem;
      z-index: 10;
      color: rgba(255,255,255,0.2);
      text-decoration: none;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      transition: color 0.3s;
      font-family: 'Space Grotesk', sans-serif;
      pointer-events: all;
      cursor: pointer;
    }

    .back-link:hover {
      color: #ff4d00;
    }

    /* Click info panel */
    .info-panel {
      position: fixed;
      bottom: 5rem;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      z-index: 10;
      background: rgba(10,10,10,0.85);
      border: 1px solid rgba(255,77,0,0.2);
      border-radius: 16px;
      padding: 1.25rem 2rem;
      backdrop-filter: blur(20px);
      opacity: 0;
      transition: opacity 0.5s, transform 0.5s;
      pointer-events: none;
      text-align: center;
      max-width: 400px;
    }

    .info-panel.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
      pointer-events: all;
    }

    .info-panel h3 {
      font-size: 1.1rem;
      font-weight: 600;
      color: #fff;
      margin-bottom: 0.3rem;
    }

    .info-panel p {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.5);
      line-height: 1.5;
    }

    .info-panel .tag {
      display: inline-block;
      padding: 0.2rem 0.6rem;
      background: rgba(255,77,0,0.15);
      color: #ff4d00;
      border-radius: 4px;
      font-size: 0.65rem;
      font-weight: 600;
      margin: 0.2rem;
    }
  </style>
</head>
<body>

  <!-- Three.js Container -->
  <div id="canvas-container"></div>

  <!-- HUD -->
  <div class="hud hud-top-left">
    <div class="hud-title">3TRES6 <span>Neural</span></div>
    <div class="hud-subtitle">DJ Connection Network</div>
  </div>

  <a href="/" class="back-link">&larr; Home</a>

  <div class="hud-stats" id="statsDisplay">
    <div class="hud-stat"><strong id="nodeCount">0</strong> nodes</div>
    <div class="hud-stat"><strong id="edgeCount">0</strong> connections</div>
    <div class="hud-stat"><strong id="particleCount">0</strong> particles</div>
  </div>

  <div class="hud hud-bottom">
    <div class="hud-hint">Move mouse to orbit &bull; Click a node</div>
  </div>

  <!-- Info Panel -->
  <div class="info-panel" id="infoPanel">
    <h3 id="infoTitle">Node</h3>
    <p id="infoDesc">Description</p>
    <div id="infoTags"></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    // ============================================================
    //  DJ DATA — same as the library
    // ============================================================
    const DJ_DATA = [
      { id:'chaos-in-the-cbd', name:'Chaos In The CBD', genres:['Deep House','Acid','Disco'], color:'#ff4d00' },
      { id:'palms-trax', name:'Palms Trax', genres:['House','Balearic','Breakbeat'], color:'#ff6a2a' },
      { id:'laurent-garnier', name:'Laurent Garnier', genres:['House','Techno','French'], color:'#ff8c00' },
      { id:'frankie-knuckles', name:'Frankie Knuckles', genres:['House','Soulful','Disco'], color:'#ff4d00' },
      { id:'floating-points', name:'Floating Points', genres:['House','Jazz','Electronic'], color:'#7c4dff' },
      { id:'richie-hawtin', name:'Richie Hawtin', genres:['Minimal','Techno'], color:'#00bcd4' },
      { id:'avalon-emerson', name:'Avalon Emerson', genres:['House','Techno','Breaks'], color:'#00e5ff' },
      { id:'dj-pierre', name:'DJ Pierre', genres:['Acid House','Techno'], color:'#ff4d00' },
      { id:'kettama', name:'KETTAMA', genres:['House','Bass','Garage'], color:'#ff9100' },
      { id:'young-marco', name:'Young Marco', genres:['Balearic','Disco','Ambient'], color:'#00c864' },
      { id:'masters-at-work', name:'Masters At Work', genres:['House','Latin','Disco'], color:'#ff6f00' },
      { id:'honey-dijon', name:'Honey Dijon', genres:['House','Techno','Disco'], color:'#e91e63' },
      { id:'seth-troxler', name:'Seth Troxler', genres:['Tech House','Minimal'], color:'#9c27b0' },
      { id:'carl-cox', name:'Carl Cox', genres:['Techno','House','Tech'], color:'#ff5722' },
      { id:'motor-city-drum', name:'MCDE', genres:['House','Disco','Soul'], color:'#4caf50' },
      { id:'alex-do', name:'Alex.Do', genres:['Hypnotic Techno','Ambient'], color:'#607d8b' },
      { id:'etapp-kyle', name:'Etapp Kyle', genres:['Hypnotic Techno','Electro'], color:'#03a9f4' },
      { id:'call-super', name:'Call Super', genres:['House','Techno','Electro'], color:'#8bc34a' },
      { id:'kerri-chandler', name:'Kerri Chandler', genres:['Deep House','Soulful'], color:'#ff5722' },
      { id:'ian-pooley', name:'Ian Pooley', genres:['Deep House','Disco'], color:'#009688' },
      { id:'apollonia', name:'Apollonia', genres:['Minimal','Deep House'], color:'#e040fb' }
    ];

    // Connections between DJs
    function buildConnections(djs) {
      const edges = [];
      for (let i = 0; i < djs.length; i++) {
        for (let j = i + 1; j < djs.length; j++) {
          const shared = []; // No genre-based connections. Only track cross-references.
          if (shared.length > 0) {
            edges.push({ from: i, to: j, strength: shared.length });
          }
        }
      }
      return edges;
    }

    const EDGES = buildConnections(DJ_DATA);

    // ============================================================
    //  THREE.JS SETUP
    // ============================================================
    const container = document.getElementById('canvas-container');
    const width = container.clientWidth;
    const height = container.clientHeight;

    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x0a0a0a, 0.0025);

    const camera = new THREE.PerspectiveCamera(60, width / height, 0.1, 1000);
    camera.position.set(0, 2, 14);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(width, height);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setClearColor(0x0a0a0a, 0);
    container.appendChild(renderer.domElement);

    // ============================================================
    //  LIGHTS
    // ============================================================
    const ambientLight = new THREE.AmbientLight(0x222244, 0.5);
    scene.add(ambientLight);

    const pointLight = new THREE.PointLight(0xff4d00, 1, 30);
    pointLight.position.set(0, 5, 5);
    scene.add(pointLight);

    const pointLight2 = new THREE.PointLight(0x00bcd4, 0.5, 30);
    pointLight2.position.set(-5, -3, 5);
    scene.add(pointLight2);

    // ============================================================
    //  BACKGROUND PARTICLES (STARS)
    // ============================================================
    const starsGeometry = new THREE.BufferGeometry();
    const starsCount = 2000;
    const starsPos = new Float32Array(starsCount * 3);
    for (let i = 0; i < starsCount * 3; i++) {
      starsPos[i] = (Math.random() - 0.5) * 200;
    }
    starsGeometry.setAttribute('position', new THREE.BufferAttribute(starsPos, 3));
    const starsMaterial = new THREE.PointsMaterial({
      color: 0xffffff,
      size: 0.15,
      transparent: true,
      opacity: 0.4
    });
    const stars = new THREE.Points(starsGeometry, starsMaterial);
    scene.add(stars);

    // ============================================================
    //  CONNECTION LINES
    // ============================================================
    const lineGroup = new THREE.Group();
    scene.add(lineGroup);

    const lineMat = new THREE.LineBasicMaterial({
      color: 0xff4d00,
      transparent: true,
      opacity: 0.08
    });

    EDGES.forEach(edge => {
      const geo = new THREE.BufferGeometry();
      const positions = new Float32Array(6);
      // Will be updated on animation
      geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      const line = new THREE.Line(geo, lineMat.clone());
      line.userData = edge;
      lineGroup.add(line);
    });

    // ============================================================
    //  DJ NODES (3D Spheres with glow)
    // ============================================================
    const nodeGroup = new THREE.Group();
    scene.add(nodeGroup);

    // Layout positions on a sphere
    const radius = 5;
    const nodes = DJ_DATA.map((dj, i) => {
      const phi = Math.acos(-1 + (2 * i + 1) / DJ_DATA.length);
      const theta = Math.sqrt(DJ_DATA.length * Math.PI) * phi;
      return {
        x: radius * Math.cos(theta) * Math.sin(phi),
        y: radius * Math.sin(theta) * Math.sin(phi),
        z: radius * Math.cos(phi)
      };
    });

    const nodeMeshes = [];
    const glowMeshes = [];

    DJ_DATA.forEach((dj, i) => {
      const pos = nodes[i];
      const color = new THREE.Color(dj.color);

      // Main sphere
      const sphereGeo = new THREE.SphereGeometry(0.35, 24, 24);
      const sphereMat = new THREE.MeshStandardMaterial({
        color: color,
        emissive: color,
        emissiveIntensity: 0.4,
        roughness: 0.2,
        metalness: 0.1
      });
      const sphere = new THREE.Mesh(sphereGeo, sphereMat);
      sphere.position.set(pos.x, pos.y, pos.z);
      sphere.userData = { djIndex: i, isDJ: true };
      nodeGroup.add(sphere);
      nodeMeshes.push(sphere);

      // Glow ring
      const glowGeo = new THREE.RingGeometry(0.5, 0.7, 32);
      const glowMat = new THREE.MeshBasicMaterial({
        color: color,
        transparent: true,
        opacity: 0.15,
        side: THREE.DoubleSide
      });
      const glow = new THREE.Mesh(glowGeo, glowMat);
      glow.position.set(pos.x, pos.y, pos.z);
      glow.lookAt(0, 0, 0);
      nodeGroup.add(glow);
      glowMeshes.push(glow);

      // Point light per node
      const nLight = new THREE.PointLight(color, 0.3, 3);
      nLight.position.set(pos.x, pos.y, pos.z);
      nodeGroup.add(nLight);

      // Label sprite
      const canvas = document.createElement('canvas');
      canvas.width = 512;
      canvas.height = 128;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = 'rgba(10,10,10,0.6)';
      ctx.roundRect(10, 10, canvas.width - 20, canvas.height - 20, 20);
      ctx.fill();
      ctx.font = 'bold 48px Space Grotesk, sans-serif';
      ctx.fillStyle = '#ffffff';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(dj.name, canvas.width / 2, canvas.height / 2);

      const texture = new THREE.CanvasTexture(canvas);
      texture.needsUpdate = true;
      const spriteMat = new THREE.SpriteMaterial({
        map: texture,
        transparent: true,
        opacity: 0.7,
        depthTest: false
      });
      const sprite = new THREE.Sprite(spriteMat);
      sprite.position.set(pos.x, pos.y + 0.9, pos.z);
      sprite.scale.set(3, 0.75, 1);
      nodeGroup.add(sprite);
    });

    // ============================================================
    //  FLOWING PARTICLES
    // ============================================================
    const particleCount = 500;
    const particleGeo = new THREE.BufferGeometry();
    const particlePos = new Float32Array(particleCount * 3);
    const particleTarget = new Float32Array(particleCount);
    const particlePhase = new Float32Array(particleCount);
    const particleSpeed = new Float32Array(particleCount);

    for (let i = 0; i < particleCount; i++) {
      const edge = EDGES[Math.floor(Math.random() * EDGES.length)];
      const from = nodes[edge.from];
      const to = nodes[edge.to];
      const t = Math.random();
      particlePos[i * 3] = from.x + (to.x - from.x) * t;
      particlePos[i * 3 + 1] = from.y + (to.y - from.y) * t;
      particlePos[i * 3 + 2] = from.z + (to.z - from.z) * t;
      particleTarget[i] = Math.random();
      particlePhase[i] = Math.random() * Math.PI * 2;
      particleSpeed[i] = 0.2 + Math.random() * 0.3;
    }

    particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePos, 3));

    const particleMat = new THREE.PointsMaterial({
      color: 0xff4d00,
      size: 0.08,
      transparent: true,
      opacity: 0.6,
      blending: THREE.AdditiveBlending
    });
    const particles = new THREE.Points(particleGeo, particleMat);
    scene.add(particles);

    // Store particle data
    const particleData = { positions: particlePos, targets: particleTarget, phases: particlePhase, speeds: particleSpeed };

    // ============================================================
    //  MOUSE INTERACTION
    // ============================================================
    let mouseX = 0, mouseY = 0;
    let targetRotX = 0, targetRotY = 0;
    let isAutoRotating = true;

    document.addEventListener('mousemove', (e) => {
      mouseX = (e.clientX / width) * 2 - 1;
      mouseY = -(e.clientY / height) * 2 + 1;
      targetRotY += (mouseX * 0.5 - targetRotY) * 0.02;
      targetRotX += (mouseY * 0.3 - targetRotX) * 0.02;
      isAutoRotating = false;
      clearTimeout(window.autoRotateTimeout);
      window.autoRotateTimeout = setTimeout(() => { isAutoRotating = true; }, 3000);
    });

    // ============================================================
    //  RAYCASTER (click detection)
    // ============================================================
    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2();
    const infoPanel = document.getElementById('infoPanel');
    const infoTitle = document.getElementById('infoTitle');
    const infoDesc = document.getElementById('infoDesc');
    const infoTags = document.getElementById('infoTags');

    renderer.domElement.addEventListener('click', (event) => {
      pointer.x = (event.clientX / width) * 2 - 1;
      pointer.y = -(event.clientY / height) * 2 + 1;
      raycaster.setFromCamera(pointer, camera);
      const intersects = raycaster.intersectObjects(nodeMeshes);

      if (intersects.length > 0) {
        const obj = intersects[0].object;
        if (obj.userData.isDJ) {
          const dj = DJ_DATA[obj.userData.djIndex];
          infoTitle.textContent = dj.name;
          infoDesc.textContent = 'DJ / Producer';
          infoTags.innerHTML = '';
          infoPanel.classList.add('visible');
          setTimeout(() => infoPanel.classList.remove('visible'), 5000);
        }
      }
    });

    // ============================================================
    //  RESIZE
    // ============================================================
    window.addEventListener('resize', () => {
      const w = container.clientWidth;
      const h = container.clientHeight;
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
      renderer.setSize(w, h);
    });

    // ============================================================
    //  UPDATE STATS
    // ============================================================
    document.getElementById('nodeCount').textContent = DJ_DATA.length;
    document.getElementById('edgeCount').textContent = EDGES.length;
    document.getElementById('particleCount').textContent = particleCount;

    // ============================================================
    //  ANIMATION LOOP
    // ============================================================
    let time = 0;

    function animate() {
      requestAnimationFrame(animate);
      time += 0.005;

      // Auto-rotate
      if (isAutoRotating) {
        targetRotY += 0.003;
      }

      // Rotate node group
      nodeGroup.rotation.x += (targetRotX - nodeGroup.rotation.x) * 0.02;
      nodeGroup.rotation.y += (targetRotY - nodeGroup.rotation.y) * 0.02;

      // Rotate stars slowly
      stars.rotation.y += 0.0002;

      // Update glow pulsing
      glowMeshes.forEach((glow, i) => {
        glow.material.opacity = 0.1 + Math.sin(time * 2 + i * 0.5) * 0.08;
        glow.scale.setScalar(1 + Math.sin(time * 1.5 + i * 0.3) * 0.1);
      });

      // Update flowing particles
      const pos = particles.geometry.attributes.position.array;
      for (let i = 0; i < particleCount; i++) {
        const edgeIdx = i % EDGES.length;
        const edge = EDGES[edgeIdx];
        const from = nodes[edge.from];
        const to = nodes[edge.to];

        let t = particleData.targets[i] + particleData.speeds[i] * 0.01;
        if (t > 1) { t = 0; particleData.targets[i] = 0; }
        particleData.targets[i] = t;

        // Ease
        const et = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;

        pos[i * 3] = from.x + (to.x - from.x) * et + Math.sin(time * 2 + particleData.phases[i]) * 0.05;
        pos[i * 3 + 1] = from.y + (to.y - from.y) * et + Math.cos(time * 1.7 + particleData.phases[i]) * 0.05;
        pos[i * 3 + 2] = from.z + (to.z - from.z) * et + Math.sin(time * 1.3 + particleData.phases[i] * 1.5) * 0.05;
      }
      particles.geometry.attributes.position.needsUpdate = true;

      // Update connection line positions
      lineGroup.children.forEach((line, i) => {
        if (i >= EDGES.length) return;
        const edge = EDGES[i];
        const from = nodes[edge.from];
        const to = nodes[edge.to];
        const posAttr = line.geometry.attributes.position;
        posAttr.array[0] = from.x + nodeGroup.position.x;
        posAttr.array[1] = from.y + nodeGroup.position.y;
        posAttr.array[2] = from.z + nodeGroup.position.z;
        posAttr.array[3] = to.x + nodeGroup.position.x;
        posAttr.array[4] = to.y + nodeGroup.position.y;
        posAttr.array[5] = to.z + nodeGroup.position.z;
        posAttr.needsUpdate = true;
      });

      // Camera slightly moves
      camera.position.x = Math.sin(time * 0.1) * 1;
      camera.position.y = 2 + Math.sin(time * 0.15) * 0.5;
      camera.lookAt(0, 0, 0);

      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
